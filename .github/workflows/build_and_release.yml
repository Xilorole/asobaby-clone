      #     inlineScript: |
      #       az storage blob upload \
      #         --account-name [ストレージアカウント名] \
      #         --container-name [コンテナ名] \
      #         --file app-release.apk \
      #         --name "latest-app.apk" \
      #         --overwrite \
      #         --auth-mode login # (別途Azureの認証設定が必要)
      #       # version.json のアップロードなどもここで行う

      - name: (Placeholder) Deploy step
        run: |
          echo "デプロイジョブを実行中..."
          ls -l
          echo "ここに 'app-release.apk' をAzureにアップロードする処理を実装します"
