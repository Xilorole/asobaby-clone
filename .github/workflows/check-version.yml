name: Check Version

on:
  pull_request:
    branches: [main]

jobs:
  version-check:
    name: Version differs from main
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need main branch history

      - name: Fetch main branch
        run: git fetch origin main

      - name: Compare versions
        run: |
          PR_VERSION=$(sed -n 's/.*val calVersion = "\([^"]*\)".*/\1/p' android/app/build.gradle.kts | head -1)
          MAIN_VERSION=$(git show origin/main:android/app/build.gradle.kts \
            | sed -n 's/.*val calVersion = "\([^"]*\)".*/\1/p' | head -1 || echo "")

          echo "PR version:   $PR_VERSION"
          echo "Main version: $MAIN_VERSION"

          if [[ -z "$PR_VERSION" ]]; then
            echo "::error::Could not read calVersion from PR branch"
            exit 1
          fi

          if [[ "$PR_VERSION" == "$MAIN_VERSION" ]]; then
            echo "::error::Version has not been bumped! PR version ($PR_VERSION) is the same as main ($MAIN_VERSION). Run: ./scripts/bump-version.sh"
            exit 1
          fi

          echo "✅ Version OK: $MAIN_VERSION → $PR_VERSION"
