name: Build & Release

on:
  push:
    branches: [main]

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Read version from build.gradle.kts
        id: version
        run: |
          VERSION=$(grep -oP 'val calVersion = "\K[^"]+' android/app/build.gradle.kts)
          if [[ -z "$VERSION" ]]; then
            echo "::error::Could not read calVersion"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "📌 Version: $VERSION (tag: v$VERSION)"

      - name: Check if tag already exists
        id: tag_check
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git ls-remote --tags origin "$TAG" | grep -q "$TAG"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "⚠️  Tag $TAG already exists — skipping release"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-java@v4
        if: steps.tag_check.outputs.exists == 'false'
        with:
          distribution: temurin
          java-version: 17

      - name: Decode release keystore
        if: steps.tag_check.outputs.exists == 'false' && env.RELEASE_KEYSTORE_BASE64 != ''
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > android/release.keystore

      - name: Create key.properties
        if: steps.tag_check.outputs.exists == 'false' && env.RELEASE_KEYSTORE_BASE64 != ''
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          cat > android/key.properties << EOF
          storeFile=../release.keystore
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Setup Gradle
        if: steps.tag_check.outputs.exists == 'false'
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-encryption-key: ${{ secrets.GRADLE_CACHE_ENCRYPTION_KEY }}

      - name: Build Release APK
        if: steps.tag_check.outputs.exists == 'false'
        run: cd android && ./gradlew assembleRelease --no-daemon --build-cache

      - name: Create git tag
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Upload APK
        if: steps.tag_check.outputs.exists == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: asobaby-apk
          path: android/app/build/outputs/apk/release/*.apk

      - name: Create GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          files: android/app/build/outputs/apk/release/*.apk
          generate_release_notes: true
