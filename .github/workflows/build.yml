name: Build & Release

on:
  push:
    tags:
      - "v*"
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Compute CalVer from tag
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/v}"
          else
            TAG="$(date +%Y.%m%d.0)"
          fi
          # Parse YYYY.MMDD.PATCH → versionCode = YYYYMMDD * 100 + PATCH
          IFS='.' read -r YEAR MMDD PATCH <<< "$TAG"
          PATCH="${PATCH:-0}"
          CODE=$(( YEAR * 1000000 + MMDD * 100 + PATCH ))
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          echo "Version: $TAG (code: $CODE)"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Decode release keystore
        if: env.RELEASE_KEYSTORE_BASE64 != ''
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > android/release.keystore

      - name: Create key.properties
        if: env.RELEASE_KEYSTORE_BASE64 != ''
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          cat > android/key.properties << EOF
          storeFile=../release.keystore
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-encryption-key: ${{ secrets.GRADLE_CACHE_ENCRYPTION_KEY }}

      - name: Build Release APK
        env:
          CAL_VERSION: ${{ steps.version.outputs.version }}
          CAL_VERSION_CODE: ${{ steps.version.outputs.code }}
        run: cd android && ./gradlew assembleRelease --no-daemon --build-cache

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: asobaby-apk
          path: android/app/build/outputs/apk/release/*.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/*.apk
          generate_release_notes: true
